services:
  transcoder:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Optional: persist outputs across restarts (remove for ephemeral behaviour)
      - transcoder_outputs:/tmp/transcoder/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  transcoder_outputs:
